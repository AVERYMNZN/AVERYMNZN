<p align="center">
  <svg width="600" height="120" viewBox="0 0 600 120" xmlns="http://www.w3.org/2000/svg">
    <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" 
          font-family="Segoe UI, Helvetica, Arial, sans-serif" 
          font-size="60" font-weight="900" letter-spacing="4">
      
      AVERY MANZON
      
      <animate 
        attributeName="fill" 
        values="#673ab7;#b388ff;#673ab7" 
        dur="4s" 
        repeatCount="indefinite" />
    </text>

    <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" 
          font-family="Segoe UI, Helvetica, Arial, sans-serif" 
          font-size="60" font-weight="900" letter-spacing="4"
          fill="none" stroke="#b388ff" stroke-width="2" opacity="0.5">
      
      AVERY MANZON

      <animate 
        attributeName="stroke-width" 
        values="0;4;0" 
        dur="4s" 
        repeatCount="indefinite" />
      <animate 
        attributeName="opacity" 
        values="0;0.5;0" 
        dur="4s" 
        repeatCount="indefinite" />
    </text>
  </svg>
</p>
