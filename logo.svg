<svg width="500" height="100" viewBox="0 0 500 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse {
      0%, 100% { fill: #673ab7; }
      50% { fill: #b388ff; }
    }
    .animated-text {
      font-family: Arial, sans-serif;
      font-size: 50px;
      font-weight: bold;
      text-anchor: middle;
      dominant-baseline: middle;
      animation: pulse 3s infinite;
    }
  </style>
  <text x="50%" y="50%" class="animated-text">MATTELLINE</text>
</svg>
