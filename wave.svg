<svg
  class="waves"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 24 150 28"
  preserveAspectRatio="none"
  shape-rendering="auto"
>
  <defs>
    <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
  </defs>
  <g class="parallax">
    <use xlink:href="#gentle-wave" x="48" y="0" class="wave-layer-1" />
    <use xlink:href="#gentle-wave" x="48" y="3" class="wave-layer-2" />
    <use xlink:href="#gentle-wave" x="48" y="5" class="wave-layer-3" />
    <use xlink:href="#gentle-wave" x="48" y="7" class="wave-layer-4" />
  </g>

  <style>
    :root {
      /* Light Mode Colors (Soft Lavender) */
      --wave-color: 103, 58, 183; /* Deep Purple base */
    }

    @media (prefers-color-scheme: dark) {
      :root {
        /* Dark Mode Colors (Neon/Vivid Purple) */
        --wave-color: 179, 136, 255; 
      }
    }

    .waves {
      position: relative;
      width: 100%;
      height: 15vh;
      min-height: 100px;
      max-height: 150px;
    }

    /* Animation logic */
    .parallax > use {
      animation: move-forever 25s cubic-bezier(.55, .5, .45, .5) infinite;
    }

    .wave-layer-1 { animation-delay: -2s; animation-duration: 7s; fill: rgba(var(--wave-color), 0.7); }
    .wave-layer-2 { animation-delay: -3s; animation-duration: 10s; fill: rgba(var(--wave-color), 0.5); }
    .wave-layer-3 { animation-delay: -4s; animation-duration: 13s; fill: rgba(var(--wave-color), 0.3); }
    .wave-layer-4 { animation-delay: -5s; animation-duration: 20s; fill: rgba(var(--wave-color), 1); }

    @keyframes move-forever {
      0% { transform: translate3d(-90px, 0, 0); }
      100% { transform: translate3d(85px, 0, 0); }
    }
  </style>
</svg>
