<svg
  class="waves"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 24 150 28"
  preserveAspectRatio="none"
  shape-rendering="auto"
  style="display: block; width: 100%; height: 100px; position: relative;"
>
  <defs>
    <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
    <style>
      :root { --purple-wave: 103, 58, 183; }
      @media (prefers-color-scheme: dark) { :root { --purple-wave: 179, 136, 255; } }

      .parallax > use {
        animation: move-forever infinite;
        will-change: transform;
      }
      .w1 { animation: move-forever 7s cubic-bezier(.55,.5,.45,.5) infinite; animation-delay: -2s; fill: rgba(var(--purple-wave), 0.7); }
      .w2 { animation: move-forever 10s cubic-bezier(.55,.5,.45,.5) infinite; animation-delay: -3s; fill: rgba(var(--purple-wave), 0.5); }
      .w3 { animation: move-forever 13s cubic-bezier(.55,.5,.45,.5) infinite; animation-delay: -4s; fill: rgba(var(--purple-wave), 0.3); }
      .w4 { animation: move-forever 20s cubic-bezier(.55,.5,.45,.5) infinite; animation-delay: -5s; fill: rgba(var(--purple-wave), 1); }

      @keyframes move-forever {
        0% { transform: translate3d(-90px, 0, 0); }
        100% { transform: translate3d(85px, 0, 0); }
      }
    </style>
  </defs>
  <g class="parallax">
    <use xlink:href="#gentle-wave" x="50" y="0" class="w1" />
    <use xlink:href="#gentle-wave" x="35" y="3" class="w2" />
    <use xlink:href="#gentle-wave" x="65" y="5" class="w3" />
    <use xlink:href="#gentle-wave" x="42" y="7" class="w4" />
  </g>
</svg>
